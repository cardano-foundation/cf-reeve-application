
services:
  publisher:
    environment:
      LOB_BLOCKCHAIN_PUBLISHER_IPFS_ENABLED: true
      LOB_BLOCKCHAIN_PUBLISHER_IPFS_LOCAL_ENABLED: true
      LOB_BLOCKCHAIN_PUBLISHER_IPFS_LOCAL_NODE: ipfs-node:5001
  ipfs:
    restart: unless-stopped
    image: ipfs/kubo:v0.40.1
    hostname: ipfs-node
    environment:
      - IPFS_PROFILE=server
    volumes:
      - ipfs-data:/data/ipfs
    networks:
      - lob
    ports:
      - "4001:4001"       # swarm / p2p
      - "5001:5001"       # API
      - "8083:8080"       # gateway (mapped to 8082 to avoid conflict with yaci-cli)
volumes:
  ipfs-data: